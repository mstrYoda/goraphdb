# ============================================================================
# GoraphDB — hostPath PersistentVolumes
#
# 15 PVs for a 5-node GoraphDB cluster:
#   - 5x data (100Gi) — bbolt shard data
#   - 5x wal  (20Gi)  — Write-Ahead Log segments
#   - 5x raft (2Gi)   — Raft consensus state
#
# hostPath auto-creates directories on the node. No manual mkdir needed.
#
# Usage:
#   kubectl apply -f ceph-persistent-volumes.yaml
#   kubectl apply -f production.yaml
# ============================================================================

# — DATA VOLUMES —

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: goraphdb-data-pv-0
spec:
  capacity:
    storage: 100Gi
  hostPath:
    path: /data/goraphdb/data-0
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: goraphdb-data-pv-1
spec:
