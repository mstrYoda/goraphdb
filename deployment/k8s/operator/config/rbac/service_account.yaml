# ServiceAccount for the GoraphDB operator.
# The operator pods run under this identity and are granted permissions
# via the ClusterRole/ClusterRoleBinding defined alongside this file.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: goraphdb-operator
  namespace: goraphdb
  labels:
    app.kubernetes.io/name: goraphdb-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/part-of: goraphdb
